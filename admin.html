<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | إضافة القضايا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Tajawal', sans-serif; background-color: #0f1115; } </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between">

    <script>
        if (localStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <header class="border-b border-gray-800 bg-[#141822] px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-reverse space-x-3">
            <i class="fa-solid fa-folder-plus text-red-600 text-xl"></i>
            <span class="text-lg font-black text-white">منظومة الإدارة والمستندات</span>
        </div>
        <button id="logout-btn" class="text-xs bg-gray-800 hover:bg-red-900 text-gray-300 hover:text-white px-3 py-1.5 rounded transition">
            تسجيل الخروج <i class="fa-solid fa-right-from-bracket mr-1"></i>
        </button>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-10 w-full flex-grow">
        <div class="bg-[#141822] border border-gray-800 p-6 rounded-xl shadow-xl">
            <h2 class="text-xl font-bold text-white mb-6 border-b border-gray-800 pb-3">➕ زرع ملف قضية جديدة في الأرشيف</h2>
            
            <form id="add-case-form" class="space-y-5">
                <div>
                    <label class="block text-xs text-gray-400 mb-2 font-bold">عنوان القضية الجنائية</label>
                    <input type="text" id="case-title" required placeholder="مثال: لغز اختفاء الساعة الذهبية" class="w-full bg-[#1a1f2c] border border-gray-700 rounded-lg px-4 py-2.5 text-xs text-white focus:outline-none focus:border-red-600">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-2 font-bold">ملخص الحبكة والوصف المثيرة</label>
                    <textarea id="case-desc" rows="4" required placeholder="اكتب تفاصيل مشوقة عن الجريمة والأدلة..." class="w-full bg-[#1a1f2c] border border-gray-700 rounded-lg px-4 py-2.5 text-xs text-white focus:outline-none focus:border-red-600 resize-none"></textarea>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-2 font-bold">السعر (ر.س)</label>
                        <input type="number" id="case-price" required placeholder="45" class="w-full bg-[#1a1f2c] border border-gray-700 rounded-lg px-4 py-2.5 text-xs text-white focus:outline-none focus:border-red-600">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-2 font-bold">تصنيف الصعوبة الجنائية</label>
                        <select id="case-difficulty" class="w-full bg-[#1a1f2c] border border-gray-700 rounded-lg px-4 py-2.5 text-xs text-white focus:outline-none focus:border-red-600">
                            <option value="easy">قضايا للمبتدئين (سهل / متوسط)</option>
                            <option value="hard">قضايا غامضة ومعقدة (صعب جداً)</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-green-700 hover:bg-green-600 text-white font-bold py-3 rounded-lg text-sm transition mt-4">
                    🚀 نشر وتثبيت القضية في المتجر فوراً
                </button>
            </form>
        </div>
    </main>

    <script>
        // تسجيل الخروج
        document.getElementById('logout-btn').addEventListener('click', function() {
            localStorage.removeItem('isAdmin');
            window.location.href = 'login.html';
        });

        // إضافة قضية
        document.getElementById('add-case-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('case-title').value;
            const desc = document.getElementById('case-desc').value;
            const price = document.getElementById('case-price').value;
            const difficulty = document.getElementById('case-difficulty').value;

            // بناء كائن القضية الجديدة
            const newCase = {
                title: "قضية: " + title,
                desc: desc,
                price: price,
                difficulty: difficulty
            };

            // جلب القضايا المضافة سابقاً أو إنشاء مصفوفة فارغة
            let customCases = JSON.parse(localStorage.getItem('customCases')) || [];
            customCases.push(newCase);

            // حفظ التحديثات في ذاكرة المتصفح
            localStorage.setItem('customCases', JSON.stringify(customCases));

            alert('تمت إضافة القضية بنجاح ونشرها في الأرشيف!');
            document.getElementById('add-case-form').reset();
        });
    </script>
</body>
</html>
